spring.application.name=${SPRING_APPLICATION_NAME:cineposts}

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/cineposts}

# JWT
jwt.secret=${JWT_SECRET:cineposts-super-secret-key-change-in-production-must-be-256-bits-long}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server
server.port=${PORT:8080}

# CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# Logging
logging.level.com.cineposts=DEBUG
logging.level.org.springframework.security=INFO